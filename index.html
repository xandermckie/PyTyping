<!doctype html>
<html lang="en">
  <head>
    <script src="/theme-init.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="description" content="PyTyping: learn Python by typing real code, character by character." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>PyTyping</title>
    <!--
      Premade fonts are loaded from Google Fonts with robust local fallbacks.
      Listing a family here only registers its @font-face rules; the browser
      downloads a face only when a setting actually selects it. Offline, the app
      degrades gracefully to platform faces — the typing loop never needs network.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Lexend:wght@400;500&family=Roboto+Mono:wght@400;500&family=Roboto:wght@400;500&family=Source+Code+Pro:wght@400;500&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
